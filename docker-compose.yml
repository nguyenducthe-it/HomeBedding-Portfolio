services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override the local MONGO_URI from .env to use the internal docker network service name 'mongo'
      - MONGO_URI=mongodb://mongo:27017/homebedding_new
      - PORT=3000
    depends_on:
      - mongo
    volumes:
      # Use bind mount for uploads so images in Windows host are directly accessible and persisted
      - ./uploads:/app/uploads

  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      # Persist MongoDB database files
      - mongo_data:/data/db
    # Port 27017 is not exposed to the host for security. Only 'app' can access it.

volumes:
  mongo_data:
